name: Update site data

on:
  push:
    paths:
      - "data/**"
      - "scripts/update_site_data.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pypdf openpyxl

      - name: Update index.html from data sources
        run: python scripts/update_site_data.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet index.html; then
            echo "No changes to commit."
          else
            git config user.name "site-data-bot"
            git config user.email "actions@users.noreply.github.com"
            git add index.html
            git commit -m "Auto-update: Scholar metrics + patents from data/ sources"
            git push
          fi
